<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Video Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .hero-section {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .hero_background-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .hero_background-video video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            min-width: 100%;
            min-height: 100%;
            object-fit: cover;
            object-position: center center;
        }

        /* Mobile responsive video scaling - shift right to show left side content */
        @media (max-width: 768px) {
            .hero_background-video video {
                object-position: 70% center;
                transform: scale(1.1);
            }
        }

        @media (max-width: 640px) {
            .hero_background-video video {
                object-position: 75% center;
                transform: scale(1.2);
            }
        }

        @media (max-width: 480px) {
            .hero_background-video video {
                object-position: 80% center;
                transform: scale(1.3);
            }
        }

        .hero_background-gradient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.3) 0%, rgba(0, 0, 0, 0.6) 100%);
            z-index: 2;
        }

        /* Optional: Add content overlay styling */
        .content-overlay {
            position: relative;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .content-overlay h1 {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .content-overlay p {
            font-size: 1.2rem;
            max-width: 600px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
        }

        /* Mobile responsive text */
        @media (max-width: 768px) {
            .content-overlay h1 {
                font-size: 2rem;
            }
            
            .content-overlay p {
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .content-overlay {
                padding: 16px;
            }
            
            .content-overlay h1 {
                font-size: 1.5rem;
            }
            
            .content-overlay p {
                font-size: 0.875rem;
            }
        }
    </style>
</head>
<body>
    <div class="hero-section">
        <!-- Background Video -->
        <div class="hero_background-video">
            <video autoplay loop muted playsinline>
                <source src="https://cdn.prod.website-files.com/642db635907c823231f539d7/646e10e845c5ccbcf27208ed_AN1-000522_en-US_A_Orthopedia%20Turntable-Style%20of%20Arthroman%201920x890_2-transcode.mp4" type="video/mp4">
                <source src="https://cdn.prod.website-files.com/642db635907c823231f539d7/646e10e845c5ccbcf27208ed_AN1-000522_en-US_A_Orthopedia%20Turntable-Style%20of%20Arthroman%201920x890_2-transcode.webm" type="video/webm">
                Your browser does not support the video tag.
            </video>
        </div>

        <!-- Gradient Overlay -->
        <div class="hero_background-gradient"></div>

        <!-- Content Overlay (Optional - you can customize or remove this) -->
        <div class="content-overlay">
            <div>
                <h1>Your Title Here</h1>
                <p>Add your content here. This text will appear over the animated background.</p>
            </div>
        </div>
    </div>
</body>
</html>
